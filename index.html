<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IR Simulator</title>
    <style>
      body {
        margin: 0;
        background-color: #222;
        color: white;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      h1 { margin-bottom: 10px; font-size: 1.5rem; }
      canvas {
        border: 2px solid #444;
        background-color: #000;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        cursor: crosshair;
      }
      p { color: #aaa; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <h1>赤外線（熱伝導）シミュレーター</h1>
    <p>マウスを動かすと赤外線光源（赤円）が移動します。グリッドの温度変化（サーモグラフィ）を確認してください。</p>
    
    <canvas id="irSim" width="600" height="600"></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
